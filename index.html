<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do Web | Pixel Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/Photos/ToDoWebLOGO.svg" />


</head>

<body class="pixel-bg min-h-screen p-8 font-brick">
    <div class="mb-12 h-32 w-48 border-1 border-dashed flex items-center justify-center text-gray-500">
        <img src="./Photos/ToDoWebLOGO.svg" />
    </div>

    <div class="max-w-3xl mx-auto space-y-8">
        <div class="flex items-stretch gap-4">
            <div class="pixel-box flex-grow">
                <div class="pixel-inner px-4 py-3">
                    <input type="text" placeholder="add a task!"
                        class="w-full bg-transparent outline-none text-gray-600 placeholder-gray-400 text-xl font-bold" />
                </div>
            </div>

            <div class="pixel-box btn-add"id="btnAdd" >
                <button class="pixel-inner px-6 py-3 text-white text-xl uppercase tracking-widest outline-none">
                    ADD
                </button>
            </div>
        </div>

        <div id="todo_list" class="space-y-4">
 
    </div>
    <template id="taskt">
                    <div class="pixel-box">
                <div class="pixel-inner px-4 py-3 flex items-center gap-4">
                    <label class="pixel-checkbox-wrapper flex items-center flex-grow">
                        <input type="checkbox" class="hidden-pixel-input" name="checkbox" value="tt" />

                        <span class="pixel-checkbox-display">

   version=" 1.1" id="svg1" width="121" height="81" viewBox="0 0 121 81" sodipodi:docname="checkmarksuper.svg"

                                xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">

                                    inkscape:zoom="1.3834766" inkscape:cx="66.13773" inkscape:cy="45.537454"
                                    inkscape:window-width="1536" inkscape:window-height="792" inkscape:window-x="0"
                                    inkscape:window-y="0" inkscape:window-maximized="1" inkscape:current-layer="g1" />

                    <span class=" text-4xl text-gray-400 font-bold cursor-pointer">⋮</span>

            </div>
